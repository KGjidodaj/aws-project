---
- name: Configuring the public reverse proxy
  hosts: proxy
  become: true
  roles:
    - nginx
- name: Configuring the internal application server
  hosts: app
  become: true
  vars_files:
    - group_vars/all.yml
  roles:
    - internal_app
- name: Configuring the private database
  hosts: db
  become: true
  vars_files:
    - group_vars/all.yml
  roles:
    - mysql_db
