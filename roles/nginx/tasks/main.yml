---
- name: 1. Downloading Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: yes
- name: 2. Setting up nginx as a reverse proxy
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/default
    content: |
      server {
        listen 80;
        location / {
          proxy_pass http://{{ hostvars[groups['app'][0]]['ansible_host'] }}:8080;
        }
      }
    notify: Restart Nginx
