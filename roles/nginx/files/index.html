<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Infrastructure</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 6px;
            background-color: #161b22;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        h1 { color: #58a6ff; }
        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            background-color: #238636;
            color: #ffffff;
            font-size: 0.9em;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gateway Node Active</h1>
        <p>Reverse Proxy & Bastion Host</p>
        <p style="color: #8b949e; font-size: 0.85em;">AWS-cloud.</p>
        <div class="status">SECURE CONNECTION</div>
    </div>
</body>
</html>
