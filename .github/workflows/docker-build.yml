---
name: Build and push docker image
on:
  push:
    branches: ["feature/k3s", "main"]
    paths:
      - 'kubernetes-try/app-src/**'
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kgjidodaj/awsec-node-app
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write #so the image can be uploaded to GHCR
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./kubernetes-try/app-src #since the files needed are saved there
          push: true
          tags: ghcr.io/kgjidodaj/awsec-node-app:latest
