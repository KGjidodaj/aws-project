---
name: Ansible Lint
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  ansible-lint:
    name: Code quality check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setting up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Running Ansible Lint
        uses: ansible/ansible-lint@v26
        with:
          targets: "playbook.yml"
